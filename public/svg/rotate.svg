<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer gold ring -->
  <circle cx="150" cy="150" r="145"
          fill="#d4a84f"
          stroke="#b8903c"
          stroke-width="4"/>

  <!-- Inner map area -->
  <clipPath id="clipCircle">
    <circle cx="150" cy="150" r="130"/>
  </clipPath>

  <g clip-path="url(#clipCircle)">
    <!-- Background (map-like gradient) -->
    <rect x="0" y="0" width="300" height="300" fill="#dfeee0"/>
    
    <!-- Fake map lines -->
    <path d="M0 180 Q150 100 300 200" stroke="#ffffff" stroke-width="2" fill="none" opacity="0.6"/>
    <path d="M50 300 Q200 150 250 0" stroke="#ffffff" stroke-width="2" fill="none" opacity="0.4"/>

    <!-- Rotating radar effect -->
    <g transform="rotate(0 150 150)">
      <line x1="150" y1="150" x2="150" y2="20"
            stroke="#000000"
            stroke-width="2"
            opacity="0.2">
        <animateTransform
          attributeName="transform"
          type="rotate"
          from="0 150 150"
          to="360 150 150"
          dur="4s"
          repeatCount="indefinite"/>
      </line>
    </g>

    <!-- Center pulse -->
    <circle cx="150" cy="150" r="8" fill="#000"/>
    
    <circle cx="150" cy="150" r="20" fill="none" stroke="#000" opacity="0.2">
      <animate attributeName="r" values="20;40;20" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>